<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineTrack — Maquettes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0A0F1C; font-family: 'DM Sans', -apple-system, sans-serif; color: #F1F5F9; min-height: 100vh; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  * { scrollbar-width: thin; scrollbar-color: #334155 transparent; }
  *::-webkit-scrollbar { width: 3px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<script type="text/babel">
const { useState } = React;

const MOVIES = [
  { id: 1, title: "Dune: Part Two", year: 2024, rating: 8.3, genre: "Sci-Fi", poster: "\u{1F3DC}\uFE0F", backdrop: "linear-gradient(135deg, #C2855A 0%, #4A3728 100%)", overview: "Paul Atreides s'unit aux Fremen pour mener la révolte contre ceux qui ont détruit sa famille, tout en tentant d'empêcher un terrible futur que lui seul peut prévoir.", duration: "2h 46min", director: "Denis Villeneuve" },
  { id: 2, title: "Oppenheimer", year: 2023, rating: 8.5, genre: "Drama", poster: "\u{1F4A5}", backdrop: "linear-gradient(135deg, #FF6B35 0%, #1A1A2E 100%)", overview: "L'histoire de J. Robert Oppenheimer et de son rôle dans le développement de la bombe atomique.", duration: "3h 01min", director: "Christopher Nolan" },
  { id: 3, title: "Spider-Man: Across the Spider-Verse", year: 2023, rating: 8.7, genre: "Animation", poster: "\u{1F577}\uFE0F", backdrop: "linear-gradient(135deg, #E63946 0%, #1D3557 100%)", overview: "Miles Morales voyage à travers le multivers et rencontre une équipe de Spider-People.", duration: "2h 20min", director: "Joaquim Dos Santos" },
  { id: 4, title: "The Batman", year: 2022, rating: 7.8, genre: "Action", poster: "\u{1F987}", backdrop: "linear-gradient(135deg, #2D2D2D 0%, #8B0000 100%)", overview: "Lorsqu'un tueur en série sadique commence à assassiner des personnalités politiques de Gotham, Batman enquête.", duration: "2h 56min", director: "Matt Reeves" },
  { id: 5, title: "Everything Everywhere All at Once", year: 2022, rating: 8.0, genre: "Sci-Fi", poster: "\u{1F300}", backdrop: "linear-gradient(135deg, #6A0572 0%, #AB83A1 100%)", overview: "Une immigrée chinoise est embarquée dans une aventure où elle seule peut sauver le monde.", duration: "2h 19min", director: "Daniel Kwan" },
  { id: 6, title: "Top Gun: Maverick", year: 2022, rating: 8.3, genre: "Action", poster: "\u2708\uFE0F", backdrop: "linear-gradient(135deg, #1B4965 0%, #CAE9FF 100%)", overview: "Après plus de trente ans de service, Pete Mitchell repousse les limites en tant que pilote d'essai.", duration: "2h 11min", director: "Joseph Kosinski" },
];

const CHAT_MESSAGES = [
  { role: "user", text: "Salut ! Recommande-moi un film de science-fiction" },
  { role: "assistant", text: "Vu que tu as aimé Dune, je te recommande Arrival de Denis Villeneuve ! Un chef-d'\u0153uvre de SF intellectuelle. Si tu veux plus d'action, Interstellar de Nolan est incontournable. \u{1F3AC}" },
  { role: "user", text: "Interstellar, il dure combien de temps ?" },
  { role: "assistant", text: "Interstellar dure 2h49. C'est long mais chaque minute vaut le coup ! La bande-son de Hans Zimmer est magistrale. Tu veux que je te trouve d'autres films avec des BO exceptionnelles ? \u{1F3B5}" },
];

const StarRating = ({ rating }) => {
  const stars = Math.round(rating / 2);
  return (
    <div style={{ display: "flex", gap: 2, alignItems: "center" }}>
      {[1,2,3,4,5].map(i => <span key={i} style={{ color: i <= stars ? "#F59E0B" : "#475569", fontSize: 11 }}>{"\u2605"}</span>)}
      <span style={{ color: "#F59E0B", fontSize: 11, marginLeft: 4, fontWeight: 600 }}>{rating}</span>
    </div>
  );
};

const MovieCard = ({ movie, onClick, isFav, onToggleFav }) => (
  <div onClick={onClick} style={{ background: "#1E293B", borderRadius: 12, overflow: "hidden", cursor: "pointer", transition: "transform 0.2s, box-shadow 0.2s", boxShadow: "0 2px 8px rgba(0,0,0,0.3)" }}
    onMouseEnter={e => { e.currentTarget.style.transform = "scale(1.03)"; e.currentTarget.style.boxShadow = "0 4px 16px rgba(59,130,246,0.2)"; }}
    onMouseLeave={e => { e.currentTarget.style.transform = "scale(1)"; e.currentTarget.style.boxShadow = "0 2px 8px rgba(0,0,0,0.3)"; }}>
    <div style={{ background: movie.backdrop, height: 130, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 42, position: "relative" }}>
      {movie.poster}
      {onToggleFav && <button onClick={e => { e.stopPropagation(); onToggleFav(movie.id); }} style={{ position: "absolute", top: 6, right: 6, background: "rgba(0,0,0,0.5)", border: "none", borderRadius: "50%", width: 28, height: 28, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 14 }}>{isFav ? "\u2764\uFE0F" : "\u{1F90D}"}</button>}
    </div>
    <div style={{ padding: "10px 10px 12px" }}>
      <div style={{ color: "#F1F5F9", fontSize: 13, fontWeight: 600, lineHeight: 1.3, marginBottom: 4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{movie.title}</div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ color: "#64748B", fontSize: 11 }}>{movie.year} · {movie.genre}</span>
        <StarRating rating={movie.rating} />
      </div>
    </div>
  </div>
);

const HomeScreen = ({ onMovieClick, favorites, onToggleFav }) => (
  <div style={{ padding: "0 12px 12px" }}>
    <div style={{ padding: "14px 0 10px" }}>
      <div style={{ color: "#F59E0B", fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", marginBottom: 2 }}>Tendances</div>
      <div style={{ color: "#F1F5F9", fontSize: 20, fontWeight: 700 }}>Films populaires</div>
    </div>
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
      {MOVIES.map(m => <MovieCard key={m.id} movie={m} onClick={() => onMovieClick(m)} isFav={favorites.includes(m.id)} onToggleFav={onToggleFav} />)}
    </div>
  </div>
);

const SearchScreen = ({ onMovieClick, favorites, onToggleFav }) => {
  const [query, setQuery] = useState("dune");
  const results = MOVIES.filter(m => m.title.toLowerCase().includes(query.toLowerCase()));
  return (
    <div style={{ padding: "12px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, background: "#1E293B", borderRadius: 10, padding: "10px 14px", marginBottom: 14, border: "1px solid #334155" }}>
        <span style={{ fontSize: 16, opacity: 0.5 }}>{"\u{1F50D}"}</span>
        <input value={query} onChange={e => setQuery(e.target.value)} placeholder="Rechercher un film..." style={{ background: "transparent", border: "none", outline: "none", color: "#F1F5F9", fontSize: 14, width: "100%", fontFamily: "inherit" }} />
        {query && <span onClick={() => setQuery("")} style={{ cursor: "pointer", fontSize: 14, color: "#64748B" }}>{"\u2715"}</span>}
      </div>
      {query && <div style={{ color: "#94A3B8", fontSize: 12, marginBottom: 10 }}>{results.length} résultat{results.length > 1 ? "s" : ""} pour « {query} »</div>}
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {results.map(m => (
          <div key={m.id} onClick={() => onMovieClick(m)} style={{ display: "flex", gap: 12, background: "#1E293B", borderRadius: 10, overflow: "hidden", cursor: "pointer", transition: "background 0.15s" }}
            onMouseEnter={e => e.currentTarget.style.background = "#253347"} onMouseLeave={e => e.currentTarget.style.background = "#1E293B"}>
            <div style={{ background: m.backdrop, width: 70, minHeight: 80, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, flexShrink: 0 }}>{m.poster}</div>
            <div style={{ padding: "10px 10px 10px 0", display: "flex", flexDirection: "column", justifyContent: "center", gap: 4 }}>
              <div style={{ color: "#F1F5F9", fontSize: 14, fontWeight: 600 }}>{m.title}</div>
              <div style={{ color: "#94A3B8", fontSize: 11 }}>{m.year} · {m.genre} · {m.duration}</div>
              <StarRating rating={m.rating} />
            </div>
          </div>
        ))}
        {results.length === 0 && query && <div style={{ textAlign: "center", padding: 40, color: "#64748B" }}><div style={{ fontSize: 36, marginBottom: 8 }}>{"\u{1F50D}"}</div><div style={{ fontSize: 14 }}>Aucun résultat pour « {query} »</div></div>}
      </div>
    </div>
  );
};

const FavoritesScreen = ({ favorites, onMovieClick, onToggleFav }) => {
  const favMovies = MOVIES.filter(m => favorites.includes(m.id));
  return (
    <div style={{ padding: "12px" }}>
      <div style={{ padding: "2px 0 10px" }}>
        <div style={{ color: "#F1F5F9", fontSize: 20, fontWeight: 700 }}>Mes favoris</div>
        <div style={{ color: "#94A3B8", fontSize: 12, marginTop: 2 }}>{favMovies.length} film{favMovies.length > 1 ? "s" : ""} sauvegardé{favMovies.length > 1 ? "s" : ""}</div>
      </div>
      {favMovies.length === 0 ? (
        <div style={{ textAlign: "center", padding: "50px 20px", color: "#64748B" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>{"\u{1F494}"}</div>
          <div style={{ fontSize: 16, fontWeight: 600, color: "#94A3B8", marginBottom: 6 }}>Aucun favori</div>
          <div style={{ fontSize: 13, lineHeight: 1.5 }}>Appuyez sur le c\u0153ur d'un film<br/>pour l'ajouter à vos favoris.</div>
          <div style={{ marginTop: 16, padding: "10px 20px", background: "#3B82F6", borderRadius: 8, display: "inline-block", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Découvrir des films</div>
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          {favMovies.map(m => <MovieCard key={m.id} movie={m} onClick={() => onMovieClick(m)} isFav={true} onToggleFav={onToggleFav} />)}
        </div>
      )}
    </div>
  );
};

const DetailScreen = ({ movie, isFav, onToggleFav, onBack }) => (
  <div>
    <div style={{ background: movie.backdrop, height: 180, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 56, position: "relative" }}>
      {movie.poster}
      <button onClick={onBack} style={{ position: "absolute", top: 10, left: 10, background: "rgba(0,0,0,0.5)", border: "none", borderRadius: "50%", width: 32, height: 32, color: "#fff", fontSize: 16, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>{"\u2190"}</button>
    </div>
    <div style={{ padding: 16, marginTop: -20, background: "#0F172A", borderRadius: "16px 16px 0 0", position: "relative" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
        <div><div style={{ color: "#F1F5F9", fontSize: 20, fontWeight: 700, marginBottom: 4 }}>{movie.title}</div><div style={{ color: "#94A3B8", fontSize: 12 }}>{movie.year} · {movie.genre} · {movie.duration}</div></div>
        <button onClick={() => onToggleFav(movie.id)} style={{ background: isFav ? "rgba(239,68,68,0.15)" : "#1E293B", border: isFav ? "1px solid rgba(239,68,68,0.3)" : "1px solid #334155", borderRadius: 10, padding: "8px 14px", cursor: "pointer", fontSize: 14 }}>{isFav ? "\u2764\uFE0F" : "\u{1F90D}"}</button>
      </div>
      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 14 }}><StarRating rating={movie.rating} /><span style={{ color: "#64748B", fontSize: 11 }}>·</span><span style={{ color: "#94A3B8", fontSize: 11 }}>Réalisé par {movie.director}</span></div>
      <div style={{ color: "#94A3B8", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Synopsis</div>
      <div style={{ color: "#CBD5E1", fontSize: 13, lineHeight: 1.6, marginBottom: 16 }}>{movie.overview}</div>
      <div style={{ display: "flex", gap: 8 }}>{["Sci-Fi", "Aventure", "Drame"].map(t => <span key={t} style={{ background: "#1E293B", color: "#94A3B8", fontSize: 11, padding: "5px 10px", borderRadius: 6, border: "1px solid #334155" }}>{t}</span>)}</div>
    </div>
  </div>
);

const ChatScreen = () => {
  const [input, setInput] = useState("");
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <div style={{ padding: "10px 14px", borderBottom: "1px solid #1E293B", display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{ width: 32, height: 32, borderRadius: "50%", background: "linear-gradient(135deg, #8B5CF6, #3B82F6)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>{"\u{1F916}"}</div>
        <div><div style={{ color: "#F1F5F9", fontSize: 14, fontWeight: 600 }}>CineBot</div><div style={{ color: "#10B981", fontSize: 10 }}>{"\u25CF"} En ligne</div></div>
      </div>
      <div style={{ flex: 1, padding: 12, overflowY: "auto", display: "flex", flexDirection: "column", gap: 10 }}>
        <div style={{ textAlign: "center", color: "#64748B", fontSize: 11, padding: "8px 0" }}>CineBot connaît vos favoris et peut vous<br/>recommander des films personnalisés {"\u{1F3AC}"}</div>
        {CHAT_MESSAGES.map((msg, i) => (
          <div key={i} style={{ display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start", gap: 6 }}>
            {msg.role === "assistant" && <div style={{ width: 24, height: 24, borderRadius: "50%", background: "linear-gradient(135deg, #8B5CF6, #3B82F6)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, flexShrink: 0, marginTop: 4 }}>{"\u{1F916}"}</div>}
            <div style={{ background: msg.role === "user" ? "#3B82F6" : "#1E293B", color: "#F1F5F9", fontSize: 13, padding: "10px 14px", borderRadius: 14, maxWidth: "80%", lineHeight: 1.5, borderBottomRightRadius: msg.role === "user" ? 4 : 14, borderBottomLeftRadius: msg.role === "assistant" ? 4 : 14 }}>{msg.text}</div>
          </div>
        ))}
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <div style={{ width: 24, height: 24, borderRadius: "50%", background: "linear-gradient(135deg, #8B5CF6, #3B82F6)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, flexShrink: 0 }}>{"\u{1F916}"}</div>
          <div style={{ display: "flex", gap: 4, padding: "10px 14px", background: "#1E293B", borderRadius: 14, borderBottomLeftRadius: 4 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#64748B", display: "inline-block", animation: "bounce 1.4s infinite", animationDelay: "0s" }}/>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#64748B", display: "inline-block", animation: "bounce 1.4s infinite", animationDelay: "0.2s" }}/>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#64748B", display: "inline-block", animation: "bounce 1.4s infinite", animationDelay: "0.4s" }}/>
          </div>
        </div>
      </div>
      <div style={{ padding: "10px 12px", borderTop: "1px solid #1E293B", display: "flex", gap: 8, alignItems: "center" }}>
        <input value={input} onChange={e => setInput(e.target.value)} placeholder="Demandez à CineBot..." style={{ flex: 1, background: "#1E293B", border: "1px solid #334155", borderRadius: 20, padding: "10px 16px", color: "#F1F5F9", fontSize: 13, outline: "none", fontFamily: "inherit" }} />
        <button style={{ width: 36, height: 36, borderRadius: "50%", background: input ? "#3B82F6" : "#1E293B", border: "none", display: "flex", alignItems: "center", justifyContent: "center", cursor: input ? "pointer" : "default", fontSize: 15 }}>{"\u2191"}</button>
      </div>
    </div>
  );
};

const TAB_CONFIG = [
  { id: "home", label: "Accueil", icon: "\u{1F3E0}" },
  { id: "search", label: "Recherche", icon: "\u{1F50D}" },
  { id: "favorites", label: "Favoris", icon: "\u2764\uFE0F" },
  { id: "chat", label: "CineBot", icon: "\u{1F916}" },
];

const PhoneMockup = ({ activeTab, setActiveTab, favorites, toggleFav, selectedMovie, setSelectedMovie }) => (
  <div style={{ width: 320, height: 640, borderRadius: 36, background: "#0F172A", border: "4px solid #334155", position: "relative", overflow: "hidden", display: "flex", flexDirection: "column", boxShadow: "0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05)" }}>
    <div style={{ padding: "10px 20px 4px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
      <span style={{ color: "#F1F5F9", fontSize: 12, fontWeight: 600 }}>9:41</span>
      <div style={{ width: 80, height: 24, borderRadius: 12, background: "#1E293B" }}/>
      <div style={{ display: "flex", gap: 4 }}><span style={{ color: "#F1F5F9", fontSize: 10 }}>{"\u{1F4F6}"}</span><span style={{ color: "#F1F5F9", fontSize: 10 }}>{"\u{1F50B}"}</span></div>
    </div>
    <div style={{ flex: 1, overflowY: "auto", overflowX: "hidden" }}>
      {selectedMovie ? <DetailScreen movie={selectedMovie} isFav={favorites.includes(selectedMovie.id)} onToggleFav={toggleFav} onBack={() => setSelectedMovie(null)} />
       : activeTab === "home" ? <HomeScreen onMovieClick={setSelectedMovie} favorites={favorites} onToggleFav={toggleFav} />
       : activeTab === "search" ? <SearchScreen onMovieClick={setSelectedMovie} favorites={favorites} onToggleFav={toggleFav} />
       : activeTab === "favorites" ? <FavoritesScreen favorites={favorites} onMovieClick={setSelectedMovie} onToggleFav={toggleFav} />
       : <ChatScreen />}
    </div>
    {!selectedMovie && <div style={{ display: "flex", justifyContent: "space-around", padding: "8px 0 14px", background: "#1E293B", borderTop: "1px solid #334155", flexShrink: 0 }}>
      {TAB_CONFIG.map(tab => (
        <button key={tab.id} onClick={() => { setActiveTab(tab.id); setSelectedMovie(null); }} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, padding: "2px 8px" }}>
          <span style={{ fontSize: 18 }}>{tab.icon}</span>
          <span style={{ fontSize: 10, fontWeight: 600, color: activeTab === tab.id ? "#3B82F6" : "#64748B" }}>{tab.label}</span>
        </button>
      ))}
    </div>}
    <div style={{ display: "flex", justifyContent: "center", paddingBottom: 6, flexShrink: 0 }}><div style={{ width: 100, height: 4, borderRadius: 2, background: "#475569" }}/></div>
  </div>
);

const screens = [
  { id: "home", label: "Accueil", desc: "Grille de films populaires, cards avec poster, note et favoris", jour: "Jour 1",
    concepts: ["View, Text, Image, Pressable", "StyleSheet & Flexbox", "FlatList + numColumns", "Composant Card réutilisable"] },
  { id: "search", label: "Recherche", desc: "TextInput avec debounce 300ms, résultats en liste, état vide", jour: "Jour 2",
    concepts: ["TextInput (onChangeText)", "Debounce avec setTimeout", "useEffect cleanup function", "Hook useSearch personnalisé"] },
  { id: "favorites", label: "Favoris", desc: "Context API + AsyncStorage, état vide soigné, toggle c\u0153ur", jour: "Jour 2",
    concepts: ["Context API + useReducer", "AsyncStorage persistance", "ListEmptyComponent", "État vide soigné (UX)"] },
  { id: "detail", label: "Détail film", desc: "Navigation Stack avec [id].js, synopsis, tags, bouton favori", jour: "Jour 1",
    concepts: ["Expo Router : [id].js", "useLocalSearchParams()", "router.push() / router.back()", "Stack navigation"] },
  { id: "chat", label: "CineBot", desc: "API IA streaming, FlatList inversée, prompt engineering", jour: "Jour 3",
    concepts: ["API IA (format OpenAI)", "Streaming SSE", "System prompt personnalisé", "FlatList inverted"] },
];

function App() {
  const [activeTab, setActiveTab] = useState("home");
  const [favorites, setFavorites] = useState([2, 3]);
  const [selectedMovie, setSelectedMovie] = useState(null);
  const [showcase, setShowcase] = useState("home");
  const toggleFav = (id) => setFavorites(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

  const current = screens.find(s => s.id === showcase) || screens[0];

  return (
    <div>
      <div style={{ textAlign: "center", padding: "40px 20px 20px" }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 4, color: "#F59E0B", textTransform: "uppercase", marginBottom: 8 }}>Maquettes de l'application</div>
        <h1 style={{ fontSize: 36, fontWeight: 700, margin: "0 0 8px", background: "linear-gradient(135deg, #F1F5F9, #94A3B8)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>{"\u{1F3AC}"} CineTrack</h1>
        <p style={{ color: "#64748B", fontSize: 14, margin: 0 }}>Application de découverte et suivi de films avec IA embarquée</p>
      </div>
      <div style={{ display: "flex", justifyContent: "center", gap: 6, flexWrap: "wrap", padding: "0 16px 28px", maxWidth: 600, margin: "0 auto" }}>
        {screens.map(s => (
          <button key={s.id} onClick={() => {
            if (s.id === "detail") { setSelectedMovie(MOVIES[0]); setActiveTab("home"); }
            else { setActiveTab(s.id); setSelectedMovie(null); }
            setShowcase(s.id);
          }} style={{
            background: showcase === s.id ? "#3B82F6" : "rgba(30,41,59,0.8)", border: "1px solid", borderColor: showcase === s.id ? "#3B82F6" : "#334155",
            color: showcase === s.id ? "#fff" : "#94A3B8", borderRadius: 20, padding: "7px 16px", fontSize: 12, fontWeight: 600, cursor: "pointer", transition: "all 0.2s", fontFamily: "inherit",
          }}>{s.label}</button>
        ))}
      </div>
      <div style={{ display: "flex", justifyContent: "center", alignItems: "flex-start", gap: 40, padding: "0 20px 40px", flexWrap: "wrap" }}>
        <div style={{ animation: "float 6s ease-in-out infinite" }}>
          <PhoneMockup activeTab={activeTab} setActiveTab={(t) => { setActiveTab(t); setShowcase(t); }}
            favorites={favorites} toggleFav={toggleFav} selectedMovie={selectedMovie}
            setSelectedMovie={(m) => { setSelectedMovie(m); if(m) setShowcase("detail"); }} />
        </div>
        <div style={{ width: 280, paddingTop: 20, animation: "fadeIn 0.5s ease" }} key={showcase}>
          <div style={{
            display: "inline-block", padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: 700, marginBottom: 10, letterSpacing: 1,
            background: current.jour === "Jour 1" ? "rgba(59,130,246,0.15)" : current.jour === "Jour 2" ? "rgba(16,185,129,0.15)" : "rgba(139,92,246,0.15)",
            color: current.jour === "Jour 1" ? "#60A5FA" : current.jour === "Jour 2" ? "#34D399" : "#A78BFA",
          }}>{current.jour.toUpperCase()}</div>
          <h2 style={{ fontSize: 22, fontWeight: 700, margin: "0 0 8px" }}>{current.label}</h2>
          <p style={{ color: "#94A3B8", fontSize: 13, lineHeight: 1.6, margin: "0 0 20px" }}>{current.desc}</p>
          <div style={{ borderTop: "1px solid #1E293B", paddingTop: 16 }}>
            <div style={{ color: "#64748B", fontSize: 11, fontWeight: 600, letterSpacing: 1, textTransform: "uppercase", marginBottom: 10 }}>Concepts clés</div>
            {current.concepts.map((c, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                <div style={{ width: 5, height: 5, borderRadius: "50%", background: "#3B82F6", flexShrink: 0 }}/>
                <span style={{ color: "#CBD5E1", fontSize: 12 }}>{c}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{ textAlign: "center", padding: 20, borderTop: "1px solid #1E293B", color: "#475569", fontSize: 12 }}>
        Interactif — cliquez sur les éléments du téléphone pour naviguer
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
